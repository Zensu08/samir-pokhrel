<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Samir Pokhrel | THE DSPR ROYAL</title>
    <style>
        /* Modern Design System Reset & Variables */
        :root {
            --bg-dark: #0a0c10;
            --card-glass: rgba(255, 255, 255, 0.03);
            --border-glass: rgba(255, 255, 255, 0.08);
            --text-primary: #ffffff;
            --text-secondary: #b3b3b3;
            --accent-glow-1: rgba(122, 79, 240, 0.4); /* Neon Purple */
            --accent-glow-2: rgba(0, 212, 255, 0.3);  /* Electric Blue */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* The Aurora Ambient Background Effects */
        body::before, body::after {
            content: '';
            position: absolute;
            width: 450px;
            height: 450px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 1;
            filter: blur(120px);
            animation: floatGlow 10s infinite alternate ease-in-out;
        }

        body::before {
            top: -10%;
            left: -10%;
            background: var(--accent-glow-1);
        }

        body::after {
            bottom: -10%;
            right: -10%;
            background: var(--accent-glow-2);
            animation-delay: -5s;
        }

        @keyframes floatGlow {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(50px, 40px) scale(1.15); }
        }

        /* Glassmorphism Main Container */
        .portfolio-card {
            position: relative;
            z-index: 10;
            background: var(--card-glass);
            border: 1px solid var(--border-glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            width: 90%;
            max-width: 750px;
            padding: 50px 40px;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            text-align: center;
        }

        /* Typography & Branding */
        .profile-title {
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: #00d4ff;
            margin-bottom: 10px;
            font-weight: 600;
        }

        h1.name {
            font-size: 3.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ffffff 40%, #a5a5a5 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 15px;
            letter-spacing: -1px;
        }

        .bio {
            font-size: 1.15rem;
            color: var(--text-secondary);
            line-height: 1.7;
            max-width: 580px;
            margin: 0 auto 35px auto;
        }

        /* Interactive Element Highlight Layout */
        .showcase-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 40px;
        }

        .showcase-item {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-glass);
            padding: 20px 10px;
            border-radius: 14px;
            transition: all 0.3s ease;
        }

        .showcase-item:hover {
            background: rgba(255, 255, 255, 0.06);
            transform: translateY(-5px);
            border-color: rgba(0, 212, 255, 0.3);
        }

        .item-num {
            font-size: 1.5rem;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 5px;
        }

        .item-label {
            font-size: 0.85rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Luxury Call-To-Action Button */
        .cta-btn {
            background: #ffffff;
            color: #0a0c10;
            border: none;
            padding: 16px 36px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 255, 255, 0.1);
        }

        .cta-btn:hover {
            transform: scale(1.03);
            box-shadow: 0 0 25px rgba(0, 212, 255, 0.5);
            background: #00d4ff;
            color: #fff;
        }

        /* Responsive Design Rules */
        @media (max-width: 600px) {
            h1.name { font-size: 2.5rem; }
            .portfolio-card { padding: 40px 20px; }
            .showcase-grid { grid-template-columns: 1fr; gap: 10px; }
        }
    </style>
</head>
<body>

    <div class="THE ROYAL GOURKHA">
        <div class="profile-title">THE DSPR ROYAL</div>
        <h1 class="name">Samir Pokhrel</h1>
        <p class="bio">
            FUCKING GANNG WITH SOME BEAUTIFUL LADIES.
        </p>

        <div class="showcase-grid">
            <div class="showcase-item">
                <div class="item-num">01</div>
                <div class="item-label">Design</div>
            </div>
            <div class="showcase-item">
                <div class="item-num">02</div>
                <div class="item-label">Development</div>
            </div>
            <div class="showcase-item">
                <div class="item-num">03</div>
                <div class="item-label">Strategy</div>
            </div>
        </div>

        <button class="cta-btn" onclick="alert('Thank you for visiting! Let\'s build something spectacular.')">
            Get In Touch
        </button>
    </div>

</body>
</html>
